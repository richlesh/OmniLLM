<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NeuroPanther</title>
  <link rel="stylesheet" href="node_modules/highlight.js/styles/github-dark.css" media="screen">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono+NL:ital,wght@0,100..800;1,100..800&display=swap">
  <style>
    @media print {
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #fff; color: #000; font-family: -apple-system, sans-serif; height: auto !important; overflow: visible !important; }
      #input-area, #image-preview-wrap, .msg-actions, .code-copy-btn { display: none !important; }
      #chat { display: block; padding: 0; height: auto !important; overflow: visible !important; }
      .msg { max-width: 100%; border-radius: 0; margin-bottom: 12px; padding: 8px 12px; page-break-inside: avoid; }
      .msg.user { background: #e8f0fe; color: #000; text-align: right; }
      .msg.assistant { background: #f5f5f5; color: #000; }
      .msg.assistant code { background: #eee; color: #000; }
      .msg.assistant pre { background: #eee; border: 1px solid #ccc; overflow: visible !important; }
      .msg.assistant pre code { background: none; color: #000; }
      .msg img { max-width: 100%; }
      a { color: #000; }
      ::-webkit-scrollbar { display: none; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user      { align-self: flex-end; background: #0a84ff; color: #fff; white-space: pre-wrap; }
    .msg.assistant { align-self: flex-start; background: #2c2c2e; }
    .msg.error     { align-self: flex-start; background: #5a1a1a; color: #ff6b6b; }

    .msg.assistant p { margin: 0 0 8px; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { margin: 0 0 8px 20px; }
    .msg.assistant li { margin-bottom: 2px; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { margin: 8px 0 4px; }
    .msg.assistant code { background: #1a1a1a; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'JetBrains Mono NL', monospace; }
    .msg.assistant pre { margin: 8px 0; border-radius: 8px; overflow-x: auto; position: relative; }
    .msg.assistant pre code { background: none; padding: 0; font-size: 13px; font-family: 'JetBrains Mono NL', monospace; }
    .code-copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #444;
      border: none;
      color: #ccc;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg.assistant pre:hover .code-copy-btn { opacity: 1; }
    .code-copy-btn:hover { background: #555; color: #fff; }
    .msg.assistant blockquote { border-left: 3px solid #555; padding-left: 10px; color: #aaa; margin: 6px 0; }
    .msg.assistant a { color: #4da3ff; }

    .msg img { max-width: 100%; border-radius: 10px; display: block; margin-top: 6px; }

    .msg-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #3a3a3c;
    }
    .msg-actions button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .msg-actions button:hover   { color: #e0e0e0; background: #3a3a3c; }
    .msg-actions button.speaking { color: #0a84ff; }

    #image-preview-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: #252525;
      border-top: 1px solid #333;
    }
    #image-preview-wrap img { height: 48px; border-radius: 6px; }
    #image-preview-wrap button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    #image-preview-wrap button:hover { color: #ff453a; }

    #translate-row {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: #252525;
      border-top: 1px solid #333;
    }
    #translate-row.visible { display: flex; }
    #translate-row label { font-size: 12px; color: #aaa; flex-shrink: 0; }
    #translate-row select {
      background: #3a3a3c;
      color: #e0e0e0;
      border: none;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    #agent-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: #252525;
      border-top: 1px solid #333;
      font-size: 12px;
      color: #aaa;
    }
    #agent-row.visible { display: flex; }
    #agent-row span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #agent-row button { background: #3a3a3c; border: none; color: #aaa; border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
    #agent-row button:hover { background: #4a4a4e; color: #e0e0e0; }

    .tool-card {
      align-self: flex-start;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-radius: 12px;
      padding: 10px 14px;
      max-width: 75%;
      font-size: 13px;
    }
    .tool-card.denied { background: #2a1a1a; border-color: #4a2a2a; }
    .tool-card.executed { background: #1a1a2a; border-color: #2a2a4a; }
    .tool-card-header { font-weight: 600; color: #4ade80; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .tool-card.denied .tool-card-header { color: #f87171; }
    .tool-card.executed .tool-card-header { color: #60a5fa; }
    .tool-card-args { font-family: 'JetBrains Mono NL', monospace; font-size: 11px; color: #aaa; background: #111; border-radius: 6px; padding: 6px 8px; margin-bottom: 8px; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
    .tool-card-result { font-family: 'JetBrains Mono NL', monospace; font-size: 11px; color: #ccc; background: #111; border-radius: 6px; padding: 6px 8px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
    .tool-card-btns { display: flex; gap: 8px; margin-top: 8px; }
    .tool-allow-btn { background: #166534; border: none; color: #4ade80; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
    .tool-allow-btn:hover { background: #15803d; }
    .tool-deny-btn  { background: #7f1d1d; border: none; color: #f87171; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
    .tool-deny-btn:hover  { background: #991b1b; }

    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #333;
      background: #252525;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #3a3a3c;
      color: #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .icon-btn:hover { background: #4a4a4e; color: #e0e0e0; }
    .icon-btn.active { background: #0a84ff; color: #fff; }
    .icon-btn svg { pointer-events: none; }

    #prompt {
      flex: 1;
      resize: none;
      background: #3a3a3c;
      color: #e0e0e0;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
    }

    #vendor-select, #model-select {
      background: #3a3a3c;
      color: #e0e0e0;
      border: none;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    #vendor-select { max-width: 100px; }
    #model-select  { max-width: 140px; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #0a84ff;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #tab-bar {
      display: flex;
      align-items: stretch;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      min-height: 36px;
      -webkit-app-region: drag;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px 0 14px;
      min-width: 100px;
      max-width: 200px;
      background: #252525;
      border-right: 1px solid #333;
      cursor: pointer;
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
      position: relative;
      user-select: none;
    }
    .tab:hover { background: #2e2e2e; color: #ccc; }
    .tab.active { background: #1e1e1e; color: #e0e0e0; border-bottom: 2px solid #0a84ff; }
    .tab.drag-over { background: #0a84ff33; }

    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-title-input {
      flex: 1;
      font-size: 12px;
      background: #3a3a3c;
      color: #e0e0e0;
      border: 1px solid #0a84ff;
      border-radius: 4px;
      padding: 1px 6px;
      outline: none;
      display: none;
      min-width: 0;
    }
    .tab-close {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: none;
      color: #666;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      -webkit-app-region: no-drag;
    }
    .tab-close:hover { background: #ff453a33; color: #ff453a; }
    .tab.unsaved .tab-title::after { content: " •"; color: #0a84ff; }

    #new-tab-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      flex-shrink: 0;
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    #new-tab-btn:hover { color: #e0e0e0; background: #2e2e2e; }

    #send-btn:hover    { background: #0070d8; }
    #send-btn:disabled { background: #444; cursor: default; }
    #send-btn svg { pointer-events: none; }
  </style>
</head>
<body>
  <div id="tab-bar">
    <!-- tabs injected here -->
    <button id="new-tab-btn" title="New Tab">+</button>
  </div>
  <div id="chat"></div>

  <div id="image-preview-wrap">
    <img id="image-preview">
    <button id="image-clear-btn" title="Remove image">✕</button>
  </div>

  <div id="input-area">
    <select id="vendor-select" title="Vendor"></select>
    <select id="model-select" title="Model"></select>
    <button class="icon-btn" id="attach-btn" title="Attach image">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button class="icon-btn" id="imagine-btn" title="Generate Image">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </button>
    <button class="icon-btn" id="translate-btn" title="Translate">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
        <path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/>
      </svg>
    </button>
    <button class="icon-btn" id="agent-btn" title="Agent Mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
    </button>
    <textarea id="prompt" rows="1" placeholder="Message…"></textarea>
    <button id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 10 4 15 9 20"/>
        <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
      </svg>
    </button>
  </div>

  <div id="translate-row">
    <label>From</label>
    <select id="from-lang"></select>
    <label>To</label>
    <select id="to-lang"></select>
  </div>

  <div id="agent-row">
    <span id="agent-dir-label">No working directory set</span>
    <button id="agent-dir-btn">Set Directory</button>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none">

  <script>
    const { ipcRenderer, shell } = require("electron");
    const { marked } = require("marked");
    const hljs = require("highlight.js");

    marked.use({
      renderer: (() => {
        const r = new marked.Renderer();
        r.code = ({ text, lang }) => {
          const language = hljs.getLanguage(lang) ? lang : "plaintext";
          return `<pre><code class="hljs language-${language}">${hljs.highlight(text, { language }).value}</code></pre>`;
        };
        return r;
      })()
    });

    const chatEl       = document.getElementById("chat");
    const prompt       = document.getElementById("prompt");
    const sendBtn      = document.getElementById("send-btn");
    const attachBtn    = document.getElementById("attach-btn");
    const imagineBtn   = document.getElementById("imagine-btn");
    const translateBtn  = document.getElementById("translate-btn");
    const translateRow  = document.getElementById("translate-row");
    const fromLangSel   = document.getElementById("from-lang");
    const toLangSel     = document.getElementById("to-lang");
    const agentBtn      = document.getElementById("agent-btn");
    const agentRow      = document.getElementById("agent-row");
    const agentDirLabel = document.getElementById("agent-dir-label");
    const agentDirBtn   = document.getElementById("agent-dir-btn");
    const fileInput    = document.getElementById("file-input");

    const LANGUAGES = [
      "Afrikaans","Arabic","Bengali","Bulgarian","Catalan","Chinese (Simplified)",
      "Chinese (Traditional)","Croatian","Czech","Danish","Dutch","English",
      "Estonian","Finnish","French","German","Greek","Gujarati","Hebrew","Hindi",
      "Hungarian","Indonesian","Italian","Japanese","Kannada","Korean","Latvian",
      "Lithuanian","Malay","Malayalam","Marathi","Norwegian","Persian","Polish",
      "Portuguese","Punjabi","Romanian","Russian","Serbian","Slovak","Slovenian",
      "Spanish","Swahili","Swedish","Tamil","Telugu","Thai","Turkish","Ukrainian",
      "Urdu","Vietnamese"
    ];
    LANGUAGES.forEach(lang => {
      fromLangSel.append(Object.assign(document.createElement("option"), { value: lang, textContent: lang }));
      toLangSel.append(Object.assign(document.createElement("option"), { value: lang, textContent: lang }));
    });
    fromLangSel.value = "English";
    toLangSel.value = "English";
    const previewWrap  = document.getElementById("image-preview-wrap");
    const previewImg   = document.getElementById("image-preview");
    const clearBtn     = document.getElementById("image-clear-btn");
    const vendorSel    = document.getElementById("vendor-select");
    const modelSel     = document.getElementById("model-select");
    const tabBar       = document.getElementById("tab-bar");
    const newTabBtn    = document.getElementById("new-tab-btn");

    // ── Tab state ──────────────────────────────────────────────────────────────
    let tabIdCounter = 0;
    let activeTabId  = null;
    const tabs = {};   // id → { id, title, history, chatLog, saved, imagineMode, attachedImage, domEl, chatSnapshot }

    function createTab(title = "New Chat", restore = null) {
      const id = ++tabIdCounter;

      // each tab owns a persistent container div
      const container = document.createElement("div");
      container.style.cssText = "display:flex;flex-direction:column;gap:10px;width:100%;";

      const tab = {
        id,
        title: title,
        history: restore ? restore.history || restore.messages
            .filter(m => m.role !== "system" && m.content)
            .map(m => ({ role: m.role, content: m.content })) : [],
        chatLog: restore ? restore.chatLog : [],
        saved: restore ? true : false,
        imagineMode: false,
        translateMode: false,
        fromLang: "English",
        toLang: "English",
        agentMode: false,
        attachedImage: null,
        vendor: restore ? restore.vendor : null,
        model: restore ? restore.model : null,
        domEl: null,
        container   // persistent chat container
      };
      tabs[id] = tab;

      // build tab DOM element
      const el = document.createElement("div");
      el.className = "tab";
      el.dataset.tabId = id;
      el.draggable = true;

      const titleSpan = document.createElement("span");
      titleSpan.className = "tab-title";
      titleSpan.textContent = title;

      const titleInput = document.createElement("input");
      titleInput.className = "tab-title-input";
      titleInput.maxLength = 80;
      titleInput.type = "text";

      const closeBtn = document.createElement("button");
      closeBtn.className = "tab-close";
      closeBtn.title = "Close tab";
      closeBtn.textContent = "×";
      closeBtn.addEventListener("click", e => { e.stopPropagation(); closeTab(id); });

      el.append(titleSpan, titleInput, closeBtn);
      el.addEventListener("click", () => switchTab(id));

      // rename on double-click
      titleSpan.addEventListener("dblclick", e => {
        e.stopPropagation();
        titleInput.value = tab.title;
        titleSpan.style.display = "none";
        titleInput.style.display = "block";
        titleInput.focus();
        titleInput.select();
      });
      titleInput.addEventListener("keydown", e => {
        if (e.key === "Enter") commitTabTitle(id);
        if (e.key === "Escape") { titleInput.style.display = "none"; titleSpan.style.display = ""; }
      });
      titleInput.addEventListener("blur", () => commitTabTitle(id));

      // drag-and-drop
      el.addEventListener("dragstart", e => {
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", id);
        ipcRenderer.send("tab-drag-start", { tabId: id, state: serializeTab(id), tabCount: Object.keys(tabs).length });
      });
      el.addEventListener("dragend", () => {
        ipcRenderer.send("tab-drag-end", { tabId: id });
      });

      tab.domEl = el;
      // insert before the + button
      tabBar.insertBefore(el, newTabBtn);

      if (restore) {
        // rebuild chat HTML from chatLog into the tab's container
        container.innerHTML = buildChatHtml(restore.chatLog);
      }

      switchTab(id);
      return id;
    }

    function commitTabTitle(id) {
      const tab = tabs[id];
      if (!tab) return;
      const titleInput = tab.domEl.querySelector(".tab-title-input");
      const titleSpan  = tab.domEl.querySelector(".tab-title");
      const val = titleInput.value.trim();
      if (val) {
        tab.title = val;
        titleSpan.textContent = val;
        if (id === activeTabId) document.title = "NeuroPanther";
      }
      titleInput.style.display = "none";
      titleSpan.style.display = "";
    }

    function markUnsaved(id) {
      const tab = tabs[id];
      if (!tab || tab.saved === false) return;
      tab.saved = false;
      tab.domEl.classList.add("unsaved");
    }

    function markSaved(id) {
      const tab = tabs[id];
      if (!tab) return;
      tab.saved = true;
      tab.domEl.classList.remove("unsaved");
    }

    function switchTab(id) {
      if (activeTabId === id) return;

      // save vendor/model of outgoing tab
      if (activeTabId && tabs[activeTabId]) {
        tabs[activeTabId].vendor = vendorSel.value;
        tabs[activeTabId].model  = modelSel.value;
        tabs[activeTabId].domEl.classList.remove("active");
        // detach outgoing container
        if (chatEl.contains(tabs[activeTabId].container)) {
          chatEl.removeChild(tabs[activeTabId].container);
        }
      }

      activeTabId = id;
      const tab = tabs[id];
      tab.domEl.classList.add("active");
      document.title = "NeuroPanther";

      // attach this tab's container
      chatEl.appendChild(tab.container);
      chatEl.scrollTop = chatEl.scrollHeight;

      // re-wire code copy buttons
      tab.container.querySelectorAll("pre").forEach(pre => {
        const copyBtn = pre.querySelector(".code-copy-btn");
        if (!copyBtn) return;
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(pre.querySelector("code").innerText);
          copyBtn.textContent = "Copied!";
          setTimeout(() => copyBtn.textContent = "Copy", 1500);
        };
      });

      // sync imagine mode UI
      imagineBtn.classList.toggle("active", tab.imagineMode);
      prompt.placeholder = tab.imagineMode ? "Describe an image to generate…" : "Message…";

      // sync translate mode UI
      translateBtn.classList.toggle("active", tab.translateMode);
      translateRow.classList.toggle("visible", tab.translateMode);
      fromLangSel.value = tab.fromLang || "English";
      toLangSel.value   = tab.toLang   || "Spanish";

      // sync agent mode UI
      agentBtn.classList.toggle("active", tab.agentMode);
      agentRow.classList.toggle("visible", tab.agentMode);

      // repopulate vendor list filtered by this tab's imagineMode, then restore vendor/model
      const targetVendor = tab.vendor || vendorSel.value;
      populateVendorSelectOnly(allVendors, targetVendor, tab.imagineMode);
      fetchAndPopulateModels(vendorSel.value, tab.model || null).then(() => {
        modelSel.style.display = tab.imagineMode ? "none" : "";
      });

      clearImage();
      prompt.focus();
    }

    function activeTab() { return tabs[activeTabId]; }

    async function closeTab(id) {
      const tab = tabs[id];
      if (!tab) return;

      if (!tab.saved && tab.chatLog.length > 0) {
        const { response } = await ipcRenderer.invoke("confirm-close-tab", { title: tab.title });
        if (response === 0) {
          // Save first
          const saved = await saveTab(id);
          if (!saved) return; // user cancelled save dialog
        } else if (response === 2) {
          return; // Cancel
        }
        // response === 1 → close without saving
      }

      const tabIds = Object.keys(tabs).map(Number);
      const idx = tabIds.indexOf(id);

      tab.domEl.remove();
      delete tabs[id];

      const remaining = Object.keys(tabs).map(Number);
      if (remaining.length === 0) {
        window.close();
      } else if (activeTabId === id) {
        // switch to adjacent tab
        const nextId = remaining[Math.min(idx, remaining.length - 1)];
        activeTabId = null;
        switchTab(nextId);
      }
    }

    function serializeTab(id) {
      const tab = tabs[id];
      if (!tab) return null;
      const vendor = (id === activeTabId) ? vendorSel.value : tab.vendor;
      const model  = (id === activeTabId) ? modelSel.value  : tab.model;
      return { title: tab.title, history: tab.history, chatLog: tab.chatLog, vendor, model };
    }

    function buildChatHtml(chatLog) {
      // Rebuild chat HTML from a saved chatLog (used when restoring a dragged-in tab)
      const tmp = document.createElement("div");
      for (const msg of chatLog) {
        if (msg.role === "user") {
          if (msg.images?.length) {
            const div = document.createElement("div");
            div.className = "msg user";
            for (const src of msg.images) {
              const img = document.createElement("img");
              img.src = src; img.style.maxWidth = "200px";
              div.appendChild(img);
            }
            if (msg.content) {
              const p = document.createElement("div");
              p.textContent = msg.content; p.style.marginTop = "6px";
              div.appendChild(p);
            }
            tmp.appendChild(div);
          } else {
            const div = document.createElement("div");
            div.className = "msg user";
            div.textContent = msg.content;
            tmp.appendChild(div);
          }
        } else {
          const div = document.createElement("div");
          div.className = "msg assistant";
          if (msg.generatedImage && msg.images?.length) {
            const img = document.createElement("img");
            img.src = msg.images[0]; img.style.maxWidth = "200px";
            div.appendChild(img);
            div.appendChild(makeImageDownloadAction(msg.images[0], "image"));
          } else {
            div.innerHTML = marked.parse(msg.content || "");
            addCodeCopyButtons(div);
            div.appendChild(makeActions(msg.content || ""));
          }
          tmp.appendChild(div);
        }
      }
      return tmp.innerHTML;
    }

    // ── Vendor / model ─────────────────────────────────────────────────────────
    let allVendors = {};
    const rememberedModel = {};

    ipcRenderer.invoke("get-vendors-and-settings").then(({ vendors, settings, pendingLoad }) => {
      allVendors = vendors;
      rememberedModel[settings.vendor] = settings.model;
      populateVendorSelect(vendors, settings.vendor, false);

      // load working directory
      ipcRenderer.invoke("agent-get-working-dir").then(dir => {
        if (dir) agentDirLabel.textContent = dir;
      });

      vendorSel.addEventListener("change", () => {
        rememberedModel[vendorSel.dataset.prev] = modelSel.value;
        vendorSel.dataset.prev = vendorSel.value;
        const tab = activeTab();
        populateVendorSelect(allVendors, vendorSel.value, tab ? tab.imagineMode : false);
      });

      if (pendingLoad) {
        const id = createTab(pendingLoad.title || "New Chat", pendingLoad);
        const tab = tabs[id];
        if (pendingLoad.title) tab.domEl.querySelector(".tab-title").textContent = pendingLoad.title;
        markSaved(id);
      } else {
        createTab();
      }
    });

    function populateVendorSelectOnly(vendors, selectedVendor, imagineOnly) {
      const current = selectedVendor || vendorSel.value;
      vendorSel.innerHTML = "";
      for (const [key, v] of Object.entries(vendors)) {
        if (imagineOnly && !v.imageGeneration) continue;
        const opt = document.createElement("option");
        opt.value = key; opt.textContent = v.label;
        vendorSel.appendChild(opt);
      }
      vendorSel.value = current;
      if (!vendorSel.value) vendorSel.selectedIndex = 0;
      vendorSel.dataset.prev = vendorSel.value;
    }

    function populateVendorSelect(vendors, selectedVendor, imagineOnly) {
      populateVendorSelectOnly(vendors, selectedVendor, imagineOnly);
      fetchAndPopulateModels(vendorSel.value);
    }

    const modelCache = {};  // vendor → models array

    async function fetchAndPopulateModels(vendor, targetModel = null) {
      if (!modelCache[vendor]) {
        modelSel.innerHTML = "<option disabled>Loading\u2026</option>";
        modelCache[vendor] = await ipcRenderer.invoke("get-models-for-vendor", vendor);
      }
      const models = modelCache[vendor];
      modelSel.innerHTML = "";
      if (!models || models.length === 0) {
        const opt = document.createElement("option");
        opt.value = ""; opt.textContent = "API Key Not Set"; opt.disabled = true;
        modelSel.appendChild(opt);
      } else {
        for (const m of models) {
          const opt = document.createElement("option");
          opt.value = m; opt.textContent = m;
          modelSel.appendChild(opt);
        }
        const restore = targetModel || rememberedModel[vendor];
        if (restore && models.includes(restore)) {
          modelSel.value = restore;
        }
      }
    }

    modelSel.addEventListener("change", () => { rememberedModel[vendorSel.value] = modelSel.value; });

    // ── Image attach ───────────────────────────────────────────────────────────
    attachBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(",")[1];
        const tab = activeTab();
        if (tab) tab.attachedImage = { base64, mediaType: file.type, dataUrl };
        previewImg.src = dataUrl;
        previewWrap.style.display = "flex";
      };
      reader.readAsDataURL(file);
      fileInput.value = "";
    });

    clearBtn.addEventListener("click", clearImage);
    function clearImage() {
      const tab = activeTab();
      if (tab) tab.attachedImage = null;
      previewWrap.style.display = "none";
      previewImg.src = "";
    }

    // right-click context menu on any image in the chat
    chatEl.addEventListener("contextmenu", e => {
      if (e.target.tagName !== "IMG") return;
      e.preventDefault();
      ipcRenderer.invoke("image-context-menu", e.target.src);
    });

    // ── Imagine mode toggle ────────────────────────────────────────────────────
    imagineBtn.addEventListener("click", () => {
      const tab = activeTab();
      if (!tab) return;
      tab.imagineMode = !tab.imagineMode;
      imagineBtn.classList.toggle("active", tab.imagineMode);
      prompt.placeholder = tab.imagineMode ? "Describe an image to generate…" : "Message…";
      populateVendorSelect(allVendors, vendorSel.value, tab.imagineMode);
      modelSel.style.display = tab.imagineMode ? "none" : "";
    });

    translateBtn.addEventListener("click", () => {
      const tab = activeTab();
      if (!tab) return;
      tab.translateMode = !tab.translateMode;
      translateBtn.classList.toggle("active", tab.translateMode);
      translateRow.classList.toggle("visible", tab.translateMode);
    });
    fromLangSel.addEventListener("change", () => { const tab = activeTab(); if (tab) tab.fromLang = fromLangSel.value; });
    toLangSel.addEventListener("change",   () => { const tab = activeTab(); if (tab) tab.toLang   = toLangSel.value; });

    agentBtn.addEventListener("click", () => {
      const tab = activeTab();
      if (!tab) return;
      tab.agentMode = !tab.agentMode;
      agentBtn.classList.toggle("active", tab.agentMode);
      agentRow.classList.toggle("visible", tab.agentMode);
    });

    agentDirBtn.addEventListener("click", async () => {
      const dir = await ipcRenderer.invoke("agent-set-working-dir");
      if (dir) agentDirLabel.textContent = dir;
    });

    // ── New tab button ─────────────────────────────────────────────────────────
    newTabBtn.addEventListener("click", () => createTab());

    // ── Tab bar drop target (receive dragged tab from another window) ──────────
    tabBar.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
    });
    tabBar.addEventListener("drop", e => {
      e.preventDefault();
      const sourceTabId = e.dataTransfer.getData("text/plain");
      ipcRenderer.send("tab-drop-here", { sourceTabId });
    });

    // ── Send ───────────────────────────────────────────────────────────────────
    async function send() {
      const tab = activeTab();
      if (!tab) return;
      const text = prompt.value.trim();
      if (!text) return;

      prompt.value = "";
      prompt.style.height = "auto";
      sendBtn.disabled = true;

      // capture these now — user may switch tabs before the await resolves
      const tabId  = tab.id;
      const vendor = vendorSel.value;
      const model  = modelSel.value;

      if (tab.imagineMode) {
        addMessage("user", `🎨 ${text}`, tabId);
        tab.chatLog.push({ role: "user", content: `🎨 ${text}`, images: [] });
        markUnsaved(tabId);
        const thinking = addMessage("assistant", "…", tabId);
        try {
          const url = await ipcRenderer.invoke("generate-image", { promptText: text, vendor });
          thinking.innerHTML = "";
          const img = document.createElement("img");
          img.src = url; img.style.maxWidth = "200px";
          thinking.appendChild(img);
          thinking.appendChild(makeImageDownloadAction(url, text));
          tab.chatLog.push({ role: "assistant", content: "", generatedImageUrl: url });
        } catch (err) {
          thinking.className = "msg error";
          thinking.textContent = "Error: " + err.message;
          tab.chatLog.pop();
        }
      } else if (tab.attachedImage) {
        const image = tab.attachedImage;
        const dataUrl = image.dataUrl;
        clearImage();

        const userDiv = document.createElement("div");
        userDiv.className = "msg user";
        const imgEl = document.createElement("img");
        imgEl.src = dataUrl; imgEl.style.maxWidth = "200px";
        userDiv.appendChild(imgEl);
        if (text) {
          const p = document.createElement("div");
          p.textContent = text; p.style.marginTop = "6px";
          userDiv.appendChild(p);
        }
        tab.container.appendChild(userDiv);
        if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight;
        tab.chatLog.push({ role: "user", content: text || "", images: [dataUrl] });
        markUnsaved(tabId);

        const thinking = addMessage("assistant", "…", tabId);
        try {
          const tempPath = await ipcRenderer.invoke("save-temp-image", { base64: image.base64, mediaType: image.mediaType });
          const reply = await ipcRenderer.invoke("chat-with-image", { tempPath, mediaType: image.mediaType, text, vendor, model });
          thinking.innerHTML = marked.parse(reply);
          addCodeCopyButtons(thinking);
          thinking.appendChild(makeActions(reply));
          tab.history.push({ role: "user", content: text || "What is in this image?" });
          tab.history.push({ role: "assistant", content: reply });
          tab.chatLog.push({ role: "assistant", content: reply, images: [] });
        } catch (err) {
          thinking.className = "msg error";
          thinking.textContent = "Error: " + err.message;
          tab.chatLog.pop();
        }
      } else {
        addMessage("user", text, tabId);
        if (tab.translateMode) {
          const sysContent = `You are a helpful assistant. The user may write in ${tab.fromLang}. Understand their message and answer their question or respond to their request fully and naturally, but always write your response in ${tab.toLang}.`;
          if (!tab.history.length || tab.history[0].role !== "system") {
            tab.history.unshift({ role: "system", content: sysContent });
          } else {
            tab.history[0].content = sysContent;
          }
        }
        tab.history.push({ role: "user", content: text });
        tab.chatLog.push({ role: "user", content: text, images: [] });
        markUnsaved(tabId);
        const thinking = addMessage("assistant", "…", tabId);
        try {
        if (tab.agentMode) {
          const today = new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
          const sysContent = `You are a helpful AI assistant with access to tools. Today's date is ${today}. Use tools as needed to answer the user's request.`;
          if (!tab.history.length || tab.history[0].role !== "system") {
            tab.history.unshift({ role: "system", content: sysContent });
          } else {
            tab.history[0].content = sysContent;
          }
          await runAgentLoop(tab, tabId, vendor, model, thinking);
        } else {
          await runStreaming(tab, tabId, vendor, model, thinking);
        }
        } catch (err) {
          thinking.className = "msg error";
          thinking.textContent = "Error: " + err.message;
          tab.chatLog.pop();
        }
      }

      if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight;
      sendBtn.disabled = false;
      prompt.focus();
    }

    function addMessage(role, text, tabId = activeTabId) {
      const tab = tabs[tabId];
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      tab.container.appendChild(div);
      if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    // ── Streaming ────────────────────────────────────────────────────────────────
    function runStreaming(tab, tabId, vendor, model, thinkingEl) {
      return new Promise((resolve, reject) => {
        let reply = "";
        thinkingEl.textContent = "";

        const onChunk = (_e, chunk) => { reply += chunk; thinkingEl.innerHTML = marked.parse(reply); addCodeCopyButtons(thinkingEl); if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight; };
        const onDone  = (_e, full)  => { cleanup(); finishAssistant(tab, tabId, thinkingEl, full); resolve(); };
        const onError = (_e, msg)   => { cleanup(); reject(new Error(msg)); };

        function cleanup() {
          ipcRenderer.removeListener("stream-chunk", onChunk);
          ipcRenderer.removeListener("stream-done",  onDone);
          ipcRenderer.removeListener("stream-error", onError);
          ipcRenderer.removeListener("stream-tool-calls", onTools);
        }
        const onTools = () => { cleanup(); reject(new Error("Unexpected tool call in non-agent mode")); };

        ipcRenderer.on("stream-chunk",      onChunk);
        ipcRenderer.on("stream-done",       onDone);
        ipcRenderer.on("stream-error",      onError);
        ipcRenderer.on("stream-tool-calls", onTools);
        ipcRenderer.send("chat-stream", { messages: tab.history, vendor, model, agentMode: false });
      });
    }

    function finishAssistant(tab, tabId, el, reply) {
      el.innerHTML = marked.parse(reply);
      addCodeCopyButtons(el);
      el.appendChild(makeActions(reply));
      tab.history.push({ role: "assistant", content: reply });
      tab.chatLog.push({ role: "assistant", content: reply, images: [] });
      markUnsaved(tabId);
    }

    // ── Agentic loop ─────────────────────────────────────────────────────────────
    async function runAgentLoop(tab, tabId, vendor, model, thinkingEl) {
      const MAX_TURNS = 20;
      let turns = 0;
      let currentEl = thinkingEl;

      while (turns++ < MAX_TURNS) {
        const toolCalls = await new Promise((resolve, reject) => {
          let reply = "";
          currentEl.textContent = "";

          const onChunk = (_e, chunk) => { reply += chunk; currentEl.innerHTML = marked.parse(reply); addCodeCopyButtons(currentEl); if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight; };
          const onDone  = (_e, full)  => { cleanup(); finishAssistant(tab, tabId, currentEl, full); resolve(null); };
          const onError = (_e, msg)   => { cleanup(); reject(new Error(msg)); };
          const onTools = (_e, calls) => { cleanup(); resolve(calls); };

          function cleanup() {
            ipcRenderer.removeListener("stream-chunk",      onChunk);
            ipcRenderer.removeListener("stream-done",       onDone);
            ipcRenderer.removeListener("stream-error",      onError);
            ipcRenderer.removeListener("stream-tool-calls", onTools);
          }

          ipcRenderer.on("stream-chunk",      onChunk);
          ipcRenderer.on("stream-done",       onDone);
          ipcRenderer.on("stream-error",      onError);
          ipcRenderer.on("stream-tool-calls", onTools);
          ipcRenderer.send("chat-stream", { messages: tab.history, vendor, model, agentMode: true });
        });

        if (!toolCalls) break; // model gave a final text response

        // push assistant tool-call message to history
        if (vendor === "anthropic") {
          tab.history.push({ role: "assistant", content: toolCalls.map(tc => ({ type: "tool_use", id: tc.id, name: tc.name, input: tc.args })) });
        } else {
          tab.history.push({ role: "assistant", content: null, tool_calls: toolCalls.map(tc => ({ id: tc.id, type: "function", function: { name: tc.name, arguments: JSON.stringify(tc.args) } })) });
        }

        // show approval cards and collect results
        const toolResults = [];
        for (const tc of toolCalls) {
          const approved = await showToolApproval(tab, tabId, tc);
          let result;
          if (approved) {
            const { ok, result: r } = await ipcRenderer.invoke("agent-execute-tool", { tool: tc.name, args: tc.args });
            result = ok ? r : `Error: ${r}`;
            showToolResult(tab, tabId, tc, result);
          } else {
            result = "User denied this tool call.";
            showToolDenied(tab, tabId, tc);
          }
          if (vendor === "anthropic") {
            toolResults.push({ type: "tool_result", tool_use_id: tc.id, content: result });
          } else {
            toolResults.push({ role: "tool", tool_call_id: tc.id, content: result });
          }
        }

        // push tool results to history
        if (vendor === "anthropic") {
          tab.history.push({ role: "user", content: toolResults });
        } else {
          for (const r of toolResults) tab.history.push(r);
        }

        // next turn
        currentEl = addMessage("assistant", "…", tabId);
      }
    }

    function showToolApproval(tab, tabId, tc) {
      return new Promise(resolve => {
        const card = document.createElement("div");
        card.className = "tool-card";
        const argsStr = JSON.stringify(tc.args, null, 2);
        card.innerHTML = `<div class="tool-card-header">⚡ ${tc.name}</div><div class="tool-card-args">${argsStr}</div><div class="tool-card-btns"><button class="tool-allow-btn">Allow</button><button class="tool-deny-btn">Deny</button></div>`;
        tabs[tabId].container.appendChild(card);
        if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight;
        card.querySelector(".tool-allow-btn").addEventListener("click", () => { card.querySelector(".tool-card-btns").remove(); resolve(true); });
        card.querySelector(".tool-deny-btn").addEventListener("click",  () => { card.querySelector(".tool-card-btns").remove(); card.classList.add("denied"); resolve(false); });
      });
    }

    function showToolResult(tab, tabId, tc, result) {
      const card = tabs[tabId].container.querySelector(".tool-card:not(.executed):not(.denied)");
      if (card) {
        card.classList.add("executed");
        card.querySelector(".tool-card-header").textContent = `✓ ${tc.name}`;
        const res = document.createElement("div");
        res.className = "tool-card-result";
        res.textContent = result.slice(0, 2000) + (result.length > 2000 ? "…" : "");
        card.appendChild(res);
        if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight;
      }
    }

    function showToolDenied(tab, tabId, tc) {
      const card = tabs[tabId].container.querySelector(".tool-card:not(.executed):not(.denied)");
      if (card) {
        card.classList.add("denied");
        card.querySelector(".tool-card-header").textContent = `✗ ${tc.name} (denied)`;
        if (tabId === activeTabId) chatEl.scrollTop = chatEl.scrollHeight;
      }
    }

    function makeActions(plainText) {
      const bar = document.createElement("div");
      bar.className = "msg-actions";

      const copy = btn("Copy", `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`);
      copy.addEventListener("click", () => navigator.clipboard.writeText(plainText));

      const speak = btn("Speak", `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`);
      speak.addEventListener("click", () => {
        if (speechSynthesis.speaking) {
          speechSynthesis.cancel();
          speak.classList.remove("speaking");
          return;
        }
        const utter = new SpeechSynthesisUtterance(plainText);
        utter.onend = () => speak.classList.remove("speaking");
        speak.classList.add("speaking");
        speechSynthesis.speak(utter);
      });

      bar.append(copy, speak);
      return bar;
    }

    function makeImageDownloadAction(url, promptText) {
      const bar = document.createElement("div");
      bar.className = "msg-actions";
      const dl = btn("Download image", `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`);
      dl.addEventListener("click", () => ipcRenderer.invoke("download-image", { url, promptText }));
      bar.appendChild(dl);
      return bar;
    }

    function btn(title, svgHtml) {
      const b = document.createElement("button");
      b.title = title;
      b.innerHTML = svgHtml;
      return b;
    }

    function addCodeCopyButtons(el) {
      el.querySelectorAll("pre").forEach(pre => {
        const copyBtn = document.createElement("button");
        copyBtn.className = "code-copy-btn";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(pre.querySelector("code").innerText);
          copyBtn.textContent = "Copied!";
          setTimeout(() => copyBtn.textContent = "Copy", 1500);
        });
        pre.appendChild(copyBtn);
      });
    }

    // ── Save helper ────────────────────────────────────────────────────────────
    async function saveTab(id) {
      const tab = tabs[id];
      if (!tab || tab.chatLog.length === 0) return true;
      const savedMessages = [];
      for (const entry of tab.chatLog) {
        const msg = { role: entry.role, content: entry.content, images: [] };
        if (entry.generatedImageUrl) {
          try {
            const res = await fetch(entry.generatedImageUrl);
            const blob = await res.blob();
            const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(blob); });
            msg.images.push(dataUrl); msg.generatedImage = true;
          } catch { msg.images.push(entry.generatedImageUrl); msg.generatedImage = true; }
        } else {
          msg.images = entry.images || [];
        }
        savedMessages.push(msg);
      }
      const ok = await ipcRenderer.invoke("save-chat-dialog", { messages: savedMessages, title: tab.title });
      if (ok) markSaved(id);
      return ok;
    }

    // ── File menu IPC ──────────────────────────────────────────────────────────
    ipcRenderer.on("new-tab", () => createTab());

    ipcRenderer.on("close-tab", () => { if (activeTabId) closeTab(activeTabId); });

    ipcRenderer.on("export-chat", async (_event, format) => {
      const tab = activeTab();
      if (!tab || tab.chatLog.length === 0) return;
      const messages = [];
      for (const entry of tab.chatLog) {
        const msg = { role: entry.role, content: entry.content || "", images: [], generatedImage: false };
        if (entry.generatedImageUrl) {
          try {
            const res = await fetch(entry.generatedImageUrl);
            const blob = await res.blob();
            const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(blob); });
            msg.images.push(dataUrl); msg.generatedImage = true;
          } catch { msg.images.push(entry.generatedImageUrl); msg.generatedImage = true; }
        } else {
          msg.images = entry.images || [];
        }
        messages.push(msg);
      }
      if (format === "html")     await ipcRenderer.invoke("export-html",     { messages, title: tab.title });
      if (format === "markdown") await ipcRenderer.invoke("export-markdown", { messages, title: tab.title });
      if (format === "pdf")      await ipcRenderer.invoke("export-pdf");
    });

    ipcRenderer.on("save-chat", async () => {
      if (activeTabId) await saveTab(activeTabId);
    });

// ── Window close check ─────────────────────────────────────────────────────
    ipcRenderer.on("check-unsaved-before-close", async () => {
      const unsavedTabs = Object.values(tabs).filter(t => !t.saved && t.chatLog.length > 0);
      if (unsavedTabs.length === 0) {
        ipcRenderer.send("close-confirmed");
        return;
      }
      const names = unsavedTabs.map(t => `"${t.title}"`).join(", ");
      const { response } = await ipcRenderer.invoke("confirm-close-window", { names });
      if (response === 0) {
        // save all unsaved tabs
        for (const t of unsavedTabs) {
          const ok = await saveTab(t.id);
          if (!ok) return; // user cancelled a save dialog — abort close
        }
        ipcRenderer.send("close-confirmed");
      } else if (response === 1) {
        ipcRenderer.send("close-confirmed"); // close without saving
      }
      // response === 2 → cancel, do nothing
    });

    // ── Drag-and-drop IPC (receive tab from another window) ───────────────────
    ipcRenderer.on("receive-tab", (_event, state) => {
      createTab(state.title, state);
    });

    ipcRenderer.on("open-chat-tab", (_event, data) => {
      createTab(data.title || "Chat", data);
    });

    // ── .chat file drag-and-drop onto window ───────────────────────────────────
    document.addEventListener("dragover", e => {
      if ([...e.dataTransfer.items].some(i => i.kind === "file")) e.preventDefault();
    });
    document.addEventListener("drop", async e => {
      const file = [...e.dataTransfer.files].find(f => f.name.endsWith(".chat"));
      if (!file) return;
      e.preventDefault();
      e.stopPropagation();
      try {
        const text = await file.text();
        const raw = JSON.parse(text);
        const title = file.name.replace(/\.chat$/, "");
        const data = { ...raw, chatLog: raw.chatLog ?? raw.messages ?? [], title };
        createTab(data.title || "Chat", data);
      } catch (err) {
        console.error("Failed to load .chat file:", err);
      }
    });

    ipcRenderer.on("remove-tab-after-drag", (_event, tabId) => {
      // Remove without unsaved-changes prompt (it moved to another window)
      const tab = tabs[tabId];
      if (!tab) return;
      const tabIds = Object.keys(tabs).map(Number);
      const idx = tabIds.indexOf(tabId);
      tab.domEl.remove();
      delete tabs[tabId];
      const remaining = Object.keys(tabs).map(Number);
      if (remaining.length === 0) {
        createTab();
      } else if (activeTabId === tabId) {
        activeTabId = null;
        switchTab(remaining[Math.min(idx, remaining.length - 1)]);
      }
    });

    // ── Keyboard / button wiring ───────────────────────────────────────────────
    sendBtn.addEventListener("click", send);

    prompt.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && speechSynthesis.speaking) {
        speechSynthesis.cancel();
        document.querySelectorAll(".speaking").forEach(el => el.classList.remove("speaking"));
      }
    });

    prompt.addEventListener("input", () => {
      prompt.style.height = "auto";
      prompt.style.height = Math.min(prompt.scrollHeight, 120) + "px";
    });
  </script>
</body>
</html>
