<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 24px;
      column-count: 2;
      column-gap: 24px;
    }
    
    body > div {
      break-inside: avoid;
      margin-bottom: 8px;
    }
    
    .buttons-row {
      column-span: all;
      margin-top: 8px;
    }

    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }

    select, input {
      width: 100%;
      background: #3a3a3c;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }
    select:focus, input:focus { border-color: #0a84ff; }

    .row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

    button {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    #cancel-btn { background: #3a3a3c; color: #e0e0e0; }
    #save-btn   { background: #0a84ff; color: #fff; }
    #api-key-link { font-size: 12px; color: #4da3ff; text-decoration: none; margin-top: 4px; display: inline-block; }
    #api-key-link:hover { text-decoration: underline; }
    .section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; padding-top: 12px; border-top: 1px solid #333; }
    .dir-row { display: flex; gap: 8px; align-items: center; }
    .dir-row input { flex: 1; }
    .dir-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #3a3a3c; color: #e0e0e0; cursor: pointer; font-size: 13px; white-space: nowrap; flex-shrink: 0; }
    .dir-btn:hover { background: #4a4a4e; }
    #api-key-section[style*="display: none"] { display: none !important; position: absolute; }
  </style>
</head>
<body>
  <div class="section-title" style="border-top:none;margin:0;padding:0;">LLM Settings</div>
  <div>
    <label>Vendor</label>
    <select id="vendor"></select>
  </div>
  <div>
    <label>Model</label>
    <select id="model"></select>
  </div>
  <div id="api-key-section">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="Enter API key…">
    <a id="api-key-link" href="#" target="_blank">Get API key…</a>
    <span id="api-key-note" style="font-size: 11px; color: #888; margin-left: 6px; display: none;">(only required for cloud models)</span>
  </div>

  <!-- Agent Settings -->
  <div class="section-title">Agent Settings</div>
  <div>
    <label>Working Directory</label>
    <div class="dir-row">
      <input id="working-dir" type="text" placeholder="No directory selected…" readonly>
      <button class="dir-btn" id="browse-dir-btn">Browse…</button>
    </div>
  </div>
  <div>
    <label>Brave Search API Key <a id="brave-key-link" href="https://api.search.brave.com" style="font-size:11px;color:#4da3ff;text-decoration:none;margin-left:6px;">Get API key…</a></label>
    <input id="brave-api-key" type="password" placeholder="Enter Brave Search API key…">
  </div>
<div style="break-before:column;">
  <!-- Translation Settings -->
  <div class="section-title">Translation Settings</div>
  <div>
    <label>Default Response Language</label>
    <select id="default-to-lang"></select>
  </div>

  <!-- Display Settings -->
  <div class="section-title">Display Settings</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <input type="checkbox" id="display-model-activity" style="width:auto;margin:0;">
    <label for="display-model-activity" style="margin:0;cursor:pointer;">Display Model Activity</label>
  </div>

  <!-- Color Settings -->
  <div class="section-title">Colors</div>
  <div style="display:flex;gap:12px;">
    <div style="flex:1">
      <label>Button Highlight</label>
      <input type="color" id="accent-color" style="height:36px;padding:2px 4px;">
    </div>
    <div style="flex:1">
      <label>User Prompt</label>
      <input type="color" id="user-bubble-color" style="height:36px;padding:2px 4px;">
    </div>
    <div style="flex:1">
      <label>AI Response</label>
      <input type="color" id="ai-bubble-color" style="height:36px;padding:2px 4px;">
    </div>
  </div>

  <div class="row buttons-row">
    <button id="cancel-btn">Cancel</button>
    <button id="save-btn">Save</button>
  </div>
</div>
  <script>
    const { ipcRenderer } = require("electron");

    const vendorSel = document.getElementById("vendor");
    const modelSel  = document.getElementById("model");
    const apiKeyIn  = document.getElementById("apiKey");
    const apiKeyLink = document.getElementById("api-key-link");

    let vendors, current;

    ipcRenderer.invoke("settings-get-data").then(async ({ settings, VENDORS }) => {
      vendors = VENDORS;
      current = settings;
      if (!current.defaultModels) current.defaultModels = {};

      for (const [key, v] of Object.entries(vendors).sort((a, b) => a[1].label.localeCompare(b[1].label))) {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = v.label;
        vendorSel.appendChild(opt);
      }

      vendorSel.value = current.vendor;
      vendorSel.dataset.prev = current.vendor;
      await populateModels(current.vendor, current.defaultModels[current.vendor] || current.model);
      apiKeyIn.value = current.apiKeys[current.vendor] || "";
      updateLink(current.vendor);

      document.getElementById("working-dir").value = current.workingDir || "";
      document.getElementById("brave-api-key").value = current.apiKeys["brave"] || "";
      document.getElementById("accent-color").value      = current.accentColor    || "#5cda05";
      document.getElementById("user-bubble-color").value = current.userBubbleColor || "#5cda05";
      document.getElementById("ai-bubble-color").value   = current.aiBubbleColor   || "#2c2c2e";

      const LANGUAGES = [
        "Afrikaans","Arabic","Bengali","Bulgarian","Catalan","Chinese (Simplified)",
        "Chinese (Traditional)","Croatian","Czech","Danish","Dutch","English",
        "Estonian","Finnish","French","German","Greek","Gujarati","Hebrew","Hindi",
        "Hungarian","Indonesian","Italian","Japanese","Kannada","Korean","Latvian",
        "Lithuanian","Malay","Malayalam","Marathi","Norwegian","Persian","Polish",
        "Portuguese","Punjabi","Romanian","Russian","Serbian","Slovak","Slovenian",
        "Spanish","Swahili","Swedish","Tamil","Telugu","Thai","Turkish","Ukrainian",
        "Urdu","Vietnamese"
      ];
      const toSel = document.getElementById("default-to-lang");
      LANGUAGES.forEach(lang => {
        toSel.append(Object.assign(document.createElement("option"), { value: lang, textContent: lang }));
      });
      toSel.value = current.defaultToLang || "English";

      document.getElementById("display-model-activity").checked = current.displayModelActivity !== false;
    });

    function updateLink(vendor) {
      const apiKeySection = document.getElementById("api-key-section");
      const apiKeyNote = document.getElementById("api-key-note");
      apiKeySection.style.display = "";
      apiKeyLink.href = vendors[vendor].apiKeyUrl || "#";
      apiKeyNote.style.display = vendor === "ollama" ? "inline" : "none";
    }

    async function populateModels(vendor, savedModel) {
      modelSel.innerHTML = "<option disabled>Loading…</option>";
      let models = null;
      if (vendor === "ollama") {
        models = await ipcRenderer.invoke("get-models-for-vendor", "ollama");
      } else {
        const apiKey = current.apiKeys[vendor] || "";
        if (apiKey) models = await ipcRenderer.invoke("fetch-models", { vendor, apiKey });
      }
      if (!models || models.length === 0) models = vendors[vendor].models;
      modelSel.innerHTML = "";
      for (const m of [...models].sort((a, b) => a.localeCompare(b))) {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        modelSel.appendChild(opt);
      }
      if (savedModel && models.includes(savedModel)) modelSel.value = savedModel;
    }

    vendorSel.addEventListener("change", async () => {
      current.defaultModels[vendorSel.dataset.prev] = modelSel.value;
      current.apiKeys[vendorSel.value] = current.apiKeys[vendorSel.value] || "";
      apiKeyIn.value = current.apiKeys[vendorSel.value];
      updateLink(vendorSel.value);
      vendorSel.dataset.prev = vendorSel.value;
      await populateModels(vendorSel.value, current.defaultModels[vendorSel.value]);
    });

    modelSel.addEventListener("change", () => {
      current.defaultModels[vendorSel.value] = modelSel.value;
    });

    // re-fetch models when API key is changed
    let keyTimer;
    apiKeyIn.addEventListener("input", () => {
      current.apiKeys[vendorSel.value] = apiKeyIn.value;
      clearTimeout(keyTimer);
      keyTimer = setTimeout(() => populateModels(vendorSel.value), 800);
    });

    apiKeyLink.addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", apiKeyLink.href);
    });

    document.getElementById("brave-key-link").addEventListener("click", e => {
      e.preventDefault();
      ipcRenderer.invoke("open-external", "https://api.search.brave.com");
    });

    document.getElementById("browse-dir-btn").addEventListener("click", async () => {
      const dir = await ipcRenderer.invoke("agent-browse-dir");
      if (dir) document.getElementById("working-dir").value = dir;
    });

    document.getElementById("save-btn").addEventListener("click", () => {
      current.apiKeys[vendorSel.value] = apiKeyIn.value;
      current.defaultModels[vendorSel.value] = modelSel.value;
      current.apiKeys["brave"] = document.getElementById("brave-api-key").value;
      ipcRenderer.invoke("settings-save", {
        vendor: vendorSel.value,
        model: modelSel.value,
        apiKeys: current.apiKeys,
        defaultModels: current.defaultModels,
        workingDir: document.getElementById("working-dir").value,
        defaultToLang:    document.getElementById("default-to-lang").value,
        displayModelActivity: document.getElementById("display-model-activity").checked,
        accentColor:      document.getElementById("accent-color").value,
        userBubbleColor:  document.getElementById("user-bubble-color").value,
        aiBubbleColor:    document.getElementById("ai-bubble-color").value
      });
    });

    document.getElementById("cancel-btn").addEventListener("click", () => {
      ipcRenderer.invoke("settings-cancel");
    });
  </script>
</body>
</html>
